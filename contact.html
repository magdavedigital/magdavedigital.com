<!DOCTYPE html>
<html>
<head>
  <title>Contact - Magdave Digital</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    /* =============== GENERAL ================= */
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
      background-color: #f4f8fb;
      color: #333;
    }

    /* =============== NAVBAR ================= */
    nav.navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 15px 20px;
      background-color: #004aad;
    }

    nav img.logo {
      height: 50px;
    }

    .nav-links {
      display: flex;
      gap: 15px;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 4px;
      transition: background 0.3s, transform 0.3s;
    }

    .nav-links a:hover {
      background-color: #ff7f11;
      transform: scale(1.05);
    }

    /* =============== HERO ================= */
    .hero {
      text-align: center;
      padding: 120px 20px;
      background: url('images/contact-hero.jpg') center/cover no-repeat;
      color: #fff;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.5);
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      margin: auto;
    }

    .hero h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 1.2em;
    }

    /* =============== CONTACT SECTION ================= */
    .contact-section {
      max-width: 1200px;
      margin: 60px auto;
      display: flex;
      gap: 50px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }

    form.contact-form {
      flex: 1 1 400px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.05);
      transition: transform 0.3s;
    }

    form.contact-form:hover {
      transform: translateY(-5px);
    }

    form input, form textarea {
      padding: 12px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1em;
      width: 100%;
      transition: border 0.3s, box-shadow 0.3s;
    }

    form input:focus, form textarea:focus {
      border: 2px solid #ff7f11;
      box-shadow: 0 0 10px rgba(255,127,17,0.3);
      outline: none;
    }

    form button {
      background-color: #ff7f11;
      color: #fff;
      border: none;
      padding: 12px;
      font-size: 1em;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    form button:hover {
      background-color: #e66600;
      transform: scale(1.05);
    }

    /* =============== CONTACT INFO ================= */
    .contact-info {
      flex: 1 1 300px;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.05);
      transition: transform 0.3s;
    }

    .contact-info:hover {
      transform: translateY(-5px);
    }

    .contact-info h3 {
      color: #004aad;
      margin-bottom: 15px;
    }

    .contact-info p {
      margin: 10px 0;
    }

    /* =============== SOCIAL ICONS ================= */
    .social-icons {
      margin-top: 20px;
      display: flex;
      gap: 15px;
    }

    .social-icons a {
      display: inline-block;
      background: #004aad;
      color: #fff;
      padding: 10px;
      border-radius: 50%;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s, transform 0.3s;
    }

    .social-icons a:hover {
      background: #ff7f11;
      transform: scale(1.2);
    }

    /* =============== MAP ================= */
    .map {
      width: 100%;
      height: 400px;
      border-radius: 10px;
      margin: 50px 0;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.05);
    }

    /* =============== WHATSAPP CTA ================= */
    .whatsapp-cta {
      display: block;
      text-align: center;
      margin: 50px 0;
    }

    .whatsapp-cta a {
      text-decoration: none;
      padding: 15px 30px;
      background-color: #ff7f11;
      color: #fff;
      font-weight: bold;
      border-radius: 5px;
      transition: background 0.3s, transform 0.3s;
    }

    .whatsapp-cta a:hover {
      background-color: #e66600;
      transform: scale(1.05);
    }

    /* =============== FOOTER ================= */
    footer {
      text-align: center;
      padding: 30px 20px;
      background-color: #004aad;
      color: #fff;
      margin-top: 40px;
    }

    /* =============== RESPONSIVE ================= */
    @media(max-width: 900px) {
      .contact-section {
        flex-direction: column;
        align-items: center;
      }
      .hero h1 {
        font-size: 2.2em;
      }
    }
  </style>
</head>
